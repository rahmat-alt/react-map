<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Peta Leaflet 3D</title>

    <!-- BOOTSTRAP -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- LEAFLET -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <!-- MAPLIBRE -->
    <link
      href="https://unpkg.com/maplibre-gl@5.6.2/dist/maplibre-gl.css"
      rel="stylesheet"
    />

    <!-- FONT AWESOME -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #000;
      }

      .container-flex {
        display: flex;
        height: 100vh;
      }

      /* =========================
         MAP WRAPPER
      ========================== */
      .map-wrapper {
        position: relative;
        width: 70%;
        height: 100vh;
        overflow: hidden;
      }

      /* =========================
         MAPLIBRE 3D
      ========================== */
      #map {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        background: #000;
      }

      /* =========================
         LEAFLET OVERLAY
      ========================== */
      #leaflet-overlay {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 999;
        background: transparent;

        /* overlay tidak blok drag map */
        pointer-events: none;
      }

      /* leaflet transparan */
      .leaflet-container {
        background: transparent !important;
      }

      /* marker tetap bisa diklik */
      #leaflet-overlay .leaflet-interactive {
        pointer-events: auto;
      }

      /* =========================
         SIDEBAR
      ========================== */
      .sidebar {
        width: 30%;
        overflow-y: auto;
        padding: 15px;
        background: #111;
        color: white;
        border-left: 1px solid #222;
      }

      table {
        font-size: 13px;
      }

      #detailBox {
        background: #1a1a1a !important;
        border: 1px solid #333 !important;
      }

      #detailBox table {
        color: white;
      }

      #detailBox table tr:nth-child(odd) {
        background: #1f1f1f;
      }

      #detailBox table td:first-child {
        font-weight: 600;
        width: 40%;
        color: cyan;
      }

      /* =========================
         GLOW POINT
      ========================== */
      .pulse-dot {
        filter: drop-shadow(0 0 10px cyan);
      }

      /* =========================
         BUTTON MAP
      ========================== */
      .btn-map {
        z-index: 9999;
        left: 10px;
        width: 45px;
        height: 45px;
        border-radius: 50%;
      }

      #heatmap {
        top: 100px;
      }

      #togglePoint {
        top: 160px;
      }

      /* =========================
         INPUT
      ========================== */
      .form-control {
        background: #1e1e1e;
        border: 1px solid #333;
        color: white;
      }

      .form-control::placeholder {
        color: #aaa;
      }
    </style>
  </head>

  <body>
    <!-- BUTTON HEATMAP -->
    <button
      name="heatmap"
      id="heatmap"
      type="button"
      class="btn btn-secondary position-absolute btn-map"
    >
      <i class="fa-solid fa-fire"></i>
    </button>

    <!-- BUTTON POINT -->
    <button id="togglePoint" class="btn btn-info position-absolute btn-map">
      <i class="fa-solid fa-location-dot"></i>
    </button>

    <div class="container-flex">
      <!-- MAP SECTION -->
      <div class="map-wrapper">
        <!-- MAPLIBRE -->
        <div id="map"></div>

        <!-- LEAFLET OVERLAY -->
        <div id="leaflet-overlay"></div>
      </div>

      <!-- SIDEBAR -->
      <div class="sidebar">
        <h4 class="mb-4 text-info">CoffeeShop Padang</h4>

        <input
          type="text"
          id="search"
          class="form-control mb-3"
          placeholder="Cari nama coffeeshop..."
        />

        <button id="searchBtn" class="btn btn-primary w-100 mb-3">
          Cari Coffeeshop
        </button>

        <h6 class="mb-3">Detail Data</h6>

        <div id="detailBox" class="border rounded p-2">
          <table class="table table-sm table-dark">
            <tbody id="detailContent">
              <tr>
                <td colspan="2" class="text-center text-secondary">
                  Klik titik di peta
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- MAIN JS -->
    <script type="module" src="/src/main.js"></script>

    <!-- BOOTSTRAP -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
