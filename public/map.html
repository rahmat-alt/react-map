<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Peta Leaflet</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      body {
        margin: 0;
      }

      .container-flex {
        display: flex;
        height: 100vh;
      }

      #map {
        width: 70%;
      }

      .sidebar {
        width: 30%;
        overflow-y: auto;
        padding: 10px;
        background: #f8f9fa;
      }

      table {
        font-size: 13px;
      }

      /* 🔥 STYLE DETAIL */
      #detailBox table td {
        font-size: 13px;
      }

      #detailBox table tr:nth-child(odd) {
        background: #f1f1f1;
      }

      #detailBox table td:first-child {
        font-weight: 500;
        width: 45%;
      }
    </style>
  </head>

  <body>
    <button
      name="heatmap"
      id="heatmap"
      type="button"
      class="btn btn-secondary position-absolute"
      style="z-index: 9999; margin-top: 100px; margin-left: 10px"
    >
      <i class="fa-solid fa-globe"></i>
    </button>

    <button
      id="togglePoint"
      class="btn btn-secondary position-absolute"
      style="z-index: 9999; margin-top: 150px; margin-left: 10px"
    >
      <i class="fa-solid fa-location-dot"></i>
    </button>

    <div class="container-flex">
      <!-- 🗺️ MAP -->
      <div id="map"></div>
      <!-- 📋 SIDEBAR -->
      <div class="sidebar">
        <h5>Filter Nama Coffeshop</h5>

        <input
          type="text"
          id="search"
          class="form-control mt-4 mb-4"
          placeholder="Cari nama..."
        />

        <button id="btnLoad" class="btn btn-primary w-100 mb-3">
          Tampilkan Coffeshop
        </button>

        <!-- 🔥 DETAIL PANEL (SEPERTI GAMBAR) -->
        <h6 class="mt-3">Detail Data</h6>
        <div id="detailBox" class="border rounded p-2 bg-white">
          <table class="table table-sm">
            <tbody id="detailContent">
              <tr>
                <td colspan="2" class="text-center text-muted">
                  Klik titik di peta
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
