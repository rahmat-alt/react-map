<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Persebaran Coffeeshop Padang</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      body {
        margin: 0;
      }

      /* MAP SECTION */
      .map-section {
        display: flex;
        height: 100vh;
      }

      #map {
        width: 70%;
        height: 100%;
      }

      .sidebar {
        width: 30%;
        overflow-y: auto;
        padding: 10px;
        background: #f8f9fa;
      }

      .btn-map {
        position: absolute;
        z-index: 9999;
        left: 10px;
      }
    </style>
  </head>

  <body>
    <!-- ================= MAP ================= -->
    <div id="mapSection" class="map-section">
      <!-- BUTTON -->
      <button id="heatmap" class="btn btn-secondary btn-map" style="top: 100px">
        <i class="fa-solid fa-globe"></i>
      </button>

      <button
        id="togglePoint"
        class="btn btn-secondary btn-map"
        style="top: 150px"
      >
        <i class="fa-solid fa-location-dot"></i>
      </button>

      <!-- MAP -->
      <div id="map"></div>

      <!-- SIDEBAR -->
      <div class="sidebar">
        <h5>Filter Coffeeshop</h5>

        <input
          type="text"
          id="search"
          class="form-control my-3"
          placeholder="Cari nama..."
        />

        <button id="btnLoad" class="btn btn-primary w-100 mb-3">
          Tampilkan Data
        </button>

        <h6>Detail</h6>
        <div class="border p-2 bg-white">
          <table class="table table-sm">
            <tbody id="detailContent">
              <tr>
                <td colspan="2" class="text-center text-muted">
                  Klik titik di peta
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- ================= SCRIPT ================= -->
    <script type="module" src="/src/main.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
